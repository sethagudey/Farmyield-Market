<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Farmyield Marketplace
  </title>

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="css/style.css"
  />

</head>

<body>

  <!-- =====================================
       HEADER
  ====================================== -->

  <header class="hero">

    <!-- TOP BAR -->

    <div class="top-bar">

      <!-- LOGO -->
      <div class="logo">

  <img
    src="images/logo.jpeg"
    alt="Farmyield Logo"
  />

</div>
      

      <!-- DROPDOWN MENU -->

      <div class="dropdown">

        <button class="menu-btn">

          ☰

        </button>

        <div class="dropdown-content">

          <button id="homeNav">

            Home

          </button>

          <button id="supportNav">

            Support

          </button>

        </div>

      </div>

    </div>

    <!-- HERO TEXT -->

    <h1>

      Fresh Farm Produce

    </h1>

    <p>

      Fresh produce directly from local farmers

    </p>

  </header>

  <!-- =====================================
       MAIN CONTENT
  ====================================== -->

  <main class="container">

    <!-- =====================================
         PRODUCTS PAGE
    ====================================== -->

    <section id="productsPage">

      <!-- PRODUCTS GRID -->

      <section
        class="products"
        id="products"
      ></section>

      <!-- CHECKOUT BUTTON -->

      <div class="navigation">

        <button id="goToCheckout">

          Continue To Checkout

        </button>

      </div>

    </section>

    <!-- =====================================
         CHECKOUT PAGE
    ====================================== -->

    <section
      id="checkoutPage"
      class="hidden"
    >

      <div class="cart">

        <h2>

          Checkout

        </h2>

        <!-- CART ITEMS -->

        <div id="cartItems"></div>

        <!-- TOTAL -->

        <h3 id="total">

          Total: GHS 0

        </h3>

        <!-- CUSTOMER DETAILS -->

        <div class="checkout">

          <input
            type="text"
            id="customerName"
            placeholder="Your Name"
          />

          <input
            type="text"
            id="customerPhone"
            placeholder="Phone Number"
          />

          <input
            type="text"
            id="customerLocation"
            placeholder="Delivery Location"
          />

        </div>

        <!-- BUTTONS -->

        <div class="checkout-buttons">

          <button id="backBtn">

            Back

          </button>

          <button id="orderBtn">

            Place Order

          </button>

        </div>

        <!-- MESSAGE -->

        <p id="message"></p>

      </div>

    </section>

    <!-- =====================================
         SUPPORT PAGE
    ====================================== -->

    <section
      id="supportPage"
      class="hidden"
    >

      <div class="support-card">

        <h2>

          Customer Support

        </h2>

        <p>

          Need help with your order?

        </p>

        <div class="support-info">

          <h3>

            Phone

          </h3>

          <p>

            +233 24 123 4567

          </p>

          <h3>

            WhatsApp

          </h3>

          <p>

            +233 24 123 4567

          </p>

          <h3>

            Email

          </h3>

          <p>

            support@farmfresh.com

          </p>

          <h3>

            Delivery Hours

          </h3>

          <p>

            Monday - Saturday
            <br />
            7:00 AM - 6:00 PM

          </p>

          <h3>

            Location

          </h3>

          <p>

            Accra, Ghana

          </p>

        </div>

        <!-- BACK BUTTON -->

        <button id="supportBackBtn">

          Back Home

        </button>

      </div>

    </section>

  </main>

  <!-- =====================================
       JAVASCRIPT FILES
  ====================================== -->

  <script src="js/products.js"></script>

  <script src="js/cart.js"></script>

  <script src="js/navigation.js"></script>

  <script src="js/api.js"></script>

  <script src="js/app.js"></script>

</body>

</html>
