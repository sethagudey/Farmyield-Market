<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FarmYield Marketplace</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- HEADER -->

  <header class="hero">

    <h1>armYield Marketplace</h1>

    <p>
      Fresh farm produce directly from heavy metal free local farmer
    </p>

  </header>

  <!-- PRODUCTS -->

  <main class="container">

    <section class="products" id="products"></section>

    <!-- CART -->

    <section class="cart">

      <h2>Your Cart</h2>

      <div id="cartItems"></div>

      <h3 id="total">Total: GHS 0</h3>

      <!-- CHECKOUT FORM -->

      <div class="checkout">

        <input
          type="text"
          id="customerName"
          placeholder="Your Name"
        />

        <input
          type="text"
          id="customerPhone"
          placeholder="Phone Number"
        />

        <input
          type="text"
          id="customerLocation"
          placeholder="Delivery Location"
        />

        <button id="orderBtn">
          Place Order
        </button>

      </div>

      <p id="message"></p>

    </section>

  </main>

  <script src="js/script.js"></script>

</body>

</html>
